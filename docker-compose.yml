version: "3.9"

# =============================================================================
# HomeBrain v2.0 — Docker Compose
# 设备层 (HA) → 决策层 (HomeBrain) → 交互层 (Web/LLM/Node-RED)
# =============================================================================

services:

  # -------------------------------------------------------------------
  # HomeBrain Core API（FastAPI）
  # 决策层入口：HA Bridge 事件监听 + 场景引擎 + LLM Adapter
  # -------------------------------------------------------------------
  homebrain-api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - HA_API_URL=http://192.168.66.68:8123
      - HA_API_TOKEN=${HA_API_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - BRAIN_ENV=production
    restart: unless-stopped

  # -------------------------------------------------------------------
  # HomeBrain Web Dashboard (future)
  # -------------------------------------------------------------------
  # homebrain-web:
  #   image: homebrain-web:latest
  #   ports:
  #     - "8080:80"
  #   depends_on:
  #     - homebrain-api
  #   restart: unless-stopped

  # -------------------------------------------------------------------
  # Node-RED Automation Flow Editor
  # -------------------------------------------------------------------
  # homebrain-node-red:
  #   image: nodered/node-red:latest
  #   ports:
  #     - "1880:1880"
  #   volumes:
  #     - /opt/homebrain/node-red:/data
  #   environment:
  #     - TZ=Asia/Shanghai
  #   restart: unless-stopped

  # -------------------------------------------------------------------
  # Mosquitto MQTT Broker
  # -------------------------------------------------------------------
  # homebrain-mqtt:
  #   image: eclipse-mosquitto:latest
  #   ports:
  #     - "1883:1883"
  #     - "9001:9001"
  #   volumes:
  #     - /opt/homebrain/mosquitto/config:/mosquitto/config
  #     - /opt/homebrain/mosquitto/data:/mosquitto/data
  #     - /opt/homebrain/mosquitto/log:/mosquitto/log
  #   restart: unless-stopped

  # -------------------------------------------------------------------
  # homebrain-drivers — DEPRECATED (v1 legacy, replaced by HA Bridge)
  # -------------------------------------------------------------------
  # homebrain-drivers:
  #   image: homebrain-drivers:legacy
  #   restart: "no"
  #   # DEPRECATED — do not deploy

  # -------------------------------------------------------------------
  # homebrain-mi-gpt — DEPRECATED (v1 legacy, replaced by LLM Adapter)
  # -------------------------------------------------------------------
  # homebrain-mi-gpt:
  #   image: homebrain-mi-gpt:legacy
  #   restart: "no"
  #   # DEPRECATED — do not deploy
