version: "3.9"

# =============================================================================
# HomeBrain v2.0 — Docker Compose
# 设备层 (HA) → 决策层 (HomeBrain) → 交互层 (Web/LLM/Node-RED)
# =============================================================================

services:

  # -------------------------------------------------------------------
  # 设备底座：Home Assistant OS-less (Container install)
  # 通过 xiaomi_home 插件导入小米设备，托管所有智能设备状态
  # -------------------------------------------------------------------
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    network_mode: host
    volumes:
      - /opt/homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

  # -------------------------------------------------------------------
  # HomeBrain Core API（FastAPI）
  # 决策层入口：HA Bridge 事件监听 + 场景引擎 + LLM Adapter
  # -------------------------------------------------------------------
  homebrain-api:
    build: ./src
    network_mode: host
    environment:
      - HA_API_URL=${HA_API_URL:-http://localhost:8123}
      - HA_API_TOKEN=${HA_API_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - BRAIN_ENV=production
    restart: unless-stopped
    depends_on:
      - homeassistant
